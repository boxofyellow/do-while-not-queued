on:
  push:
  workflow_dispatch:
    inputs:
      update-dist:
        description: 'Update dist (run ncc build and commit if changed)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: do-while-not-queued
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.git-check.outputs.changed }}
    steps:
      - name: Run Major
        uses: boxofyellow/do-while-not-queued@v2 # MAJOR_VERSION_TAG
        with:
          command-line: 'echo'
          args: 'hello-world'
          workflow: ${{ github.WORKFLOW }}
          max-runs: 3
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Full Version
        uses: boxofyellow/do-while-not-queued@v2.0.37 # FULL_VERSION_TAG
        with:
          command-line: 'echo'
          args: 'hello-world'
          workflow: ${{ github.WORKFLOW }}
          max-runs: 3
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # To use a local copy of this repository's action, you must check out the repository
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Get ready to rebuilt dist
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20

      - name: Install dependencies, ncc and build
        run: |
          npm install
          npm i -g @vercel/ncc
          ncc build index.js --license licenses.txt

      - name: Check for changes
        id: git-check
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git status --porcelain
          echo "changed=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT

      - name: Log github.ref
        run: echo '${{ github.ref }}'

      - name: do-while-not-queued step
        uses: ./ # Uses an action in the root directory
        with:
          command-line: 'pwsh'
          args: '-command;Start-Sleep -Seconds 2'
          workflow: ${{ github.WORKFLOW }}
          max-Runs: 7
          max-time-seconds: 10
          detail-level: 2
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dist and package-lock.json artifact
        if: ${{ steps.git-check.outputs.changed != '0' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist-and-package-lock
          path: |
            dist/
            package-lock.json
          retention-days: 1 # we don't need to keep these very long at all.

      - name: Fail if dist is not up to date, and we are not committing changes
        if: ${{ steps.git-check.outputs.changed != '0' && !(startsWith(github.ref, 'refs/heads/dependabot/')) && github.event.inputs.update-dist != 'true' }}
        run: |
          echo "dist is not up to date. Please run the build and commit the changes. If you want to update the dist, please set the update-dist input to true or create a dependabot PR."
          exit 1

  commit:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.outputs.changed != '0' && (github.event.inputs.update-dist == 'true' || startsWith(github.ref, 'refs/heads/dependabot/')) }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download dist and package-lock.json artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: dist-and-package-lock
          path: /tmp/dist-artifact

      - name: Copy dist and package-lock.json into repo
        run: |
          cp -r /tmp/dist-artifact/dist ./
          cp /tmp/dist-artifact/package-lock.json ./

      # If there are changes, and this is either a dependabot PR or the update-dist input is true, commit and push the changes
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ package-lock.json
          git commit -m "chore: update dist after ncc build"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
